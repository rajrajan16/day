<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Display</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
        .iframe-wrapper {
            position: absolute;
            top: -80px; left: 0; right: 0; bottom: -80px;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 0; left: 0;
            border: none;
            transform: scale(0.5);
            transform-origin: top left;
            width: 200%;
            height: 200%;
        }
        video { display: none; }
    </style>
</head>
<body>
    <div class="iframe-wrapper">
        <iframe id="dayFrame"></iframe>
    </div>

        // --- Keep screen awake ---

            video.play().catch(() => {});
        }

        // Method 2: Wake Lock API as backup
        async function requestWakeLock() {
            try {
                const lock = await navigator.wakeLock.request('screen');
                lock.addEventListener('release', requestWakeLock);
            } catch (e) {}
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
        });

        // Method 3: requestAnimationFrame to keep JS thread active
        (function keepJSAlive() {
            requestAnimationFrame(keepJSAlive);
        })();

        // --- Iframe logic ---
        function loadIframe() {
            iframe.src = BASE_URL + '?t=' + Date.now();
        }

        function msUntilMidnight() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            return midnight - now;
        }

        function scheduleRefresh() {
            setTimeout(function () {
                loadIframe();
                scheduleRefresh();
            }, msUntilMidnight());
        }

        loadIframe();
        scheduleRefresh();
        startVideoKeepAwake();
        requestWakeLock();
    </script>
</body>
</html>
