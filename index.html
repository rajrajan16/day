<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Display</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
        .iframe-wrapper {
            position: absolute;
            top: -80px; left: 0; right: 0; bottom: -80px;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 0; left: 0;
            border: none;
            transform: scale(0.5);
            transform-origin: top left;
            width: 200%;
            height: 200%;
        }
    </style>
</head>
<body>
    <div class="iframe-wrapper">
        <iframe id="dayFrame"></iframe>
    </div>
    <script>
        const iframe = document.getElementById('dayFrame');
        const BASE_URL = 'https://script.google.com/a/macros/iskl.edu.my/s/AKfycbzTY7uzTeBxw8SIhY2J0gzJ9oZUavoCCT9xkA6Ng971UCMPlYc4cjP8rc3YXfblxWiLow/exec';

        function loadIframe() {
            iframe.src = BASE_URL + '?t=' + Date.now();
            console.log('Reloaded at', new Date().toLocaleTimeString());
        }

        // Reload every 25 minutes to beat GAS session timeout
        setInterval(loadIframe, 25 * 60 * 1000);

        // Also reload at midnight for new day
        function scheduleRefresh() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            setTimeout(function () {
                loadIframe();
                scheduleRefresh();
            }, midnight - now);
        }

        loadIframe();
        scheduleRefresh();
    </script>
</body>
</html>
