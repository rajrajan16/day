<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #dayLabel {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 8rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <div id="dayLabel"></div>
    <script>
        const CALENDAR_ID = 'iskl.edu.my_7fqt0f2sj8odprhnalgdsa1a5k@group.calendar.google.com';
        const ICAL_URL = 'https://calendar.google.com/calendar/ical/' + encodeURIComponent(CALENDAR_ID) + '/public/basic.ics';
        const PROXY = 'https://corsproxy.io/?url=';

        function todayStr() {
            const n = new Date();
            return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}`;
        }

        async function fetchDay() {
            try {
                const res = await fetch(PROXY + encodeURIComponent(ICAL_URL));
                const text = await res.text();
                const today = todayStr();
                const blocks = text.split('BEGIN:VEVENT');
                for (let i = 1; i < blocks.length; i++) {
                    const b = blocks[i];
                    const summary = (b.match(/SUMMARY[^:]*:([^\r\n]+)/) || [])[1] || '';
                    const dtstart = (b.match(/DTSTART[^:]*:([^\r\n]+)/) || [])[1] || '';
                    if (/^\d{8}$/.test(dtstart.trim()) && dtstart.trim() === today && /^day\s*\d+/i.test(summary.trim())) {
                        document.getElementById('dayLabel').textContent = summary.trim();
                        return;
                    }
                }
                document.getElementById('dayLabel').textContent = '';
            } catch (e) {}
        }

        fetchDay();
        setInterval(fetchDay, 30 * 60 * 1000);
        (function scheduleMidnight() {
            const now = new Date();
            const midnight = new Date(now); midnight.setHours(24,0,0,0);
            setTimeout(() => { fetchDay(); scheduleMidnight(); }, midnight - now);
        })();
    </script>
</body>
</html>
