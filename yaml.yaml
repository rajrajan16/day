name: Update Day from Calendar

on:
  schedule:
    # Runs at 6:00 AM Malaysia time (MYT = UTC+8), so 22:00 UTC
    - cron: '0 22 * * *'
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-day:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Fetch calendar and extract today's day
        run: |
          # Set timezone to Malaysia so date commands return MYT date
          export TZ=Asia/Kuala_Lumpur

          # Fetch the iCal feed
          curl -L "https://calendar.google.com/calendar/ical/iskl.edu.my_7fqt0f2sj8odprhnalgdsa1a5k%40group.calendar.google.com/public/basic.ics" -o calendar.ics
          
          # Get TODAY's date in Malaysia timezone (YYYYMMDD)
          TODAY=$(TZ=Asia/Kuala_Lumpur date +%Y%m%d)
          echo "Today's date (MYT): $TODAY"
          
          # Export TODAY so next steps can use it
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          
          # Look for today's all-day event containing "Day"
          DAY_EVENT=$(grep -B5 -A5 "DTSTART;VALUE=DATE:$TODAY" calendar.ics | grep "SUMMARY" | grep -i "day" | head -1 | sed 's/SUMMARY://' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          
          # If found, use it; otherwise default to "Day 1"
          if [ ! -z "$DAY_EVENT" ]; then
            echo "Day event found: $DAY_EVENT"
          else
            DAY_EVENT="Day 1"
            echo "No Day event found for today, defaulting to: Day 1"
          fi
          
          # Write day.json
          echo "{\"day\":\"$DAY_EVENT\",\"date\":\"$TODAY\"}" > day.json
          cat day.json
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add day.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update day.json for ${{ env.TODAY }}"
            git push
            echo "Changes pushed successfully"
          fi
