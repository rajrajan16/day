<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        #dayLabel {
            color: white;
            font-size: 10vw;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
        }
        
        .loading {
            color: white;
            font-size: 5vw;
        }
    </style>
</head>
<body>
    <div id="dayLabel" class="loading">Loading...</div>

    <script>
        async function getDayFromCalendar() {
            try {
                const response = await fetch('./day.json?t=' + Date.now());
                const data = await response.json();
                
                if (data.day && data.day.toLowerCase().includes('day')) {
                    document.getElementById('dayLabel').textContent = data.day;
                } else {
                    document.getElementById('dayLabel').textContent = 'Day 1'; // Fallback
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('dayLabel').textContent = 'Day 1'; // Fallback
            }
        }

        // Load immediately
        getDayFromCalendar();
        
        // Refresh every hour
        setInterval(getDayFromCalendar, 60 * 60 * 1000);
        
        // Reload at midnight
        function msUntilMidnight() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            return midnight - now;
        }
        
        setTimeout(() => {
            window.location.reload();
        }, msUntilMidnight());
    </script>
</body>
</html>
