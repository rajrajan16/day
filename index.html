<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Display</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        #dayLabel {
            color: white;
            font-size: 10vw;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
            transition: opacity 0.4s;
        }
    </style>
</head>
<body>
    <div id="dayLabel"></div>

    <script>
        // ⬇️ Paste your deployed GAS web app URL here
        const GAS_URL = https://script.google.com/macros/s/AKfycbxAZrZxO8S17_Vmr1UUJdnOjqKNYUNNjNgx2RZAIuVywPvED9hfFnopf91BFM-KuRlqWQ/exec;

        async function updateDay() {
            try {
                const res = await fetch(GAS_URL + '?t=' + Date.now());
                const data = await res.json();
                const label = document.getElementById('dayLabel');
                label.style.opacity = 0;
                setTimeout(() => {
                    label.textContent = data.day || '';
                    label.style.opacity = 1;
                }, 300);
            } catch (e) {
                console.error('Failed to fetch day:', e);
            }
        }

        updateDay();
        setInterval(updateDay, 60 * 60 * 1000); // refresh every hour

        // Reload at MYT midnight
        function msUntilMidnightMYT() {
            const myt = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kuala_Lumpur' }));
            const midnight = new Date(myt);
            midnight.setHours(24, 0, 0, 0);
            return midnight - myt;
        }
        setTimeout(() => window.location.reload(), msUntilMidnightMYT());
    </script>
</body>
</html>
