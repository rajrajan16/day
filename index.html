<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        #dayLabel {
            color: white;
            font-size: 10vw;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
        }
        
        .loading {
            color: white;
            font-size: 5vw;
        }
    </style>
</head>
<body>
    <div id="dayLabel" class="loading">Loading...</div>

    <script>
        async function getDayFromCalendar() {
            try {
                // Try to get from day.json first
                const response = await fetch('./day.json?t=' + Date.now());
                const data = await response.json();
                
                // Check if data is from today
                const today = new Date();
                const todayStr = today.getFullYear() + 
                               String(today.getMonth() + 1).padStart(2,'0') + 
                               String(today.getDate()).padStart(2,'0');
                
                // If data is from today and has a day, use it
                if (data.date === todayStr && data.day && data.day.toLowerCase().includes('day')) {
                    document.getElementById('dayLabel').textContent = data.day;
                    return;
                }
                
                // Otherwise calculate based on date (fallback)
                console.log('Using calculated fallback');
                calculateDayManually();
                
            } catch (error) {
                console.error('Error fetching day.json:', error);
                calculateDayManually();
            }
        }
        
        function calculateDayManually() {
            // Simple calculation - you can adjust this based on your actual schedule
            const today = new Date();
            const startDate = new Date(2026, 2, 1); // March 1, 2026
            const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            
            // Cycle between Day 1 and Day 2 (every 2 days)
            const dayNumber = (diffDays % 2) + 1;
            document.getElementById('dayLabel').textContent = `Day ${dayNumber}`;
        }

        // Load immediately
        getDayFromCalendar();
        
        // Refresh every hour
        setInterval(getDayFromCalendar, 60 * 60 * 1000);
        
        // Reload at midnight
        function msUntilMidnight() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            return midnight - now;
        }
        
        setTimeout(() => {
            window.location.reload();
        }, msUntilMidnight());
    </script>
</body>
</html>
