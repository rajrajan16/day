<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        .day-container {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #dayLabel {
            font-size: 8vw;
            font-weight: bold;
            line-height: 1.2;
        }
        
        #dateLabel {
            font-size: 3vw;
            opacity: 0.9;
            margin-top: 10px;
        }
        
        .loading {
            color: white;
            font-size: 4vw;
        }
        
        .error {
            color: #ff9999;
            font-size: 3vw;
        }
    </style>
</head>
<body>
    <div class="day-container">
        <div id="dayLabel" class="loading">Loading...</div>
        <div id="dateLabel"></div>
    </div>

    <script>
        async function getDayFromCalendar() {
            try {
                // Fetch the day.json file (updated daily by GitHub Action)
                const response = await fetch('./day.json?t=' + Date.now());
                const data = await response.json();
                
                if (data.day && data.day.toLowerCase().includes('day')) {
                    document.getElementById('dayLabel').textContent = data.day;
                    
                    // Format date nicely
                    if (data.date) {
                        const year = data.date.substring(0,4);
                        const month = data.date.substring(4,6);
                        const day = data.date.substring(6,8);
                        const date = new Date(year, month-1, day);
                        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                        document.getElementById('dateLabel').textContent = date.toLocaleDateString('en-US', options);
                    }
                } else {
                    document.getElementById('dayLabel').textContent = 'No Day Event Today';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('dayLabel').textContent = 'Day 1'; // Fallback
                document.getElementById('dayLabel').className = 'error';
            }
        }

        // Load immediately
        getDayFromCalendar();
        
        // Refresh every hour (just in case)
        setInterval(getDayFromCalendar, 60 * 60 * 1000);
        
        // Reload page at midnight to ensure fresh data
        function msUntilMidnight() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            return midnight - now;
        }
        
        setTimeout(() => {
            window.location.reload();
        }, msUntilMidnight());
    </script>
</body>
</html>
